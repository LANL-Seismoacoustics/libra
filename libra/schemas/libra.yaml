Libra :
  description : Self-describing schema to be used in conjunction with the Python-based schema serialization library, Libra.
  columns :
    column_name :
      type : String(length = 30)
      nullable : True
      default : '-'
      info :
        format : 30.30s
        width : 30
    column_position :
      type : Numeric(8)
      nullable : False
      info :
        format : i8
        width : 8
    constraint_type :
      type : String(length = 2)
      nullable : False
      info :
        format : 2.2s
        width : 2
    _default :
      type : String(length = 64)
      nullable : True
      default : '-'
      info :
        format : 64.64s
        width : 64
    description :
      type : String(length = 1024)
      nullable : True
      default : '-'
      info :
        format : 1024.1024s
        width : 1024
    key_name :
      type : String(length = 64)
      nullable : False
      info :
        format : 64.64s
        width : 64
    key_type :
      type : String(length = 32)
      nullable : False
      info :
        format : 32.32s
        width : 32
    key_value :
      type : String(length = 128)
      nullable : True
      default : '-'
      info : 
        format : 128.128s
        width : 128
    loadauthor :
      type : String(length = 32)
      nullable : True
      default : '-'
      info : 
        format : 32.32s
        width : 32
    loaddate :
      type : DateTime()
      nullable : False
      default : {'$ref' : 'datetime.now'}
      info :
        format : '%Y-%m-%d %H:%M:%S'
        width : 19
    modauthor :
      type : String(length = 32)
      nullable : True
      default : '-'
      info : 
        format : 32.32s
        width : 32
    moddate :
      type : DateTime()
      nullable : False
      default : {'$ref' : 'datetime.now'}
      onupdate : {'$ref' : 'datetime.now'}
      info :
        format : '%Y-%m-%d %H:%M:%S'
        width : 19
    model_name :
      type : String(length = 30)
      nullable : False
      info :
        format : 30.30s
        width : 30
    nullable :
      type : String(length = 1)
      nullable : False
      default : 'y'
      info :
        format : 1.1s
        width : 1
    onupdate :
      type : String(length = 64)
      nullable : True
      default : '-'
      info :
        format : 64.64s
        width : 64
    schema_name : 
      type : String(length = 30)
      nullable : False
      info : 
        format : 30.30s
        width : 30
    sqltext :
      type : String(length = 1024)
      nullable : True
      default : '-'
      info :
        format : 1024.1024s
        width : 1024
    type :
      type : String(length = 64)
      nullable : False
      info :
        format : 64.64s
        width : 64
  models :
    schemadescript :
      columns : [schema_name, description, modauthor, loadauthor, moddate, loaddate]
      constraints : 
        - pk : {columns : [schema_name]}
    modeldescript :
      columns : [model_name, description, schema_name, modauthor, loadauthor, moddate, loaddate]
      constraints :
        - pk : {columns : [model_name, schema_name]}
    columnassoc :
      columns : [column_name, model_name, column_position, schema_name, modauthor, loadauthor, moddate, loaddate]
      constraints :
        - pk : {columns : [column_name, model_name, schema_name]}
    columndescript :
      columns : [column_name, type, nullable, _default, onupdate, schema_name, modauthor, loadauthor, moddate, loaddate]
      constraints :
        - pk : {columns : [column_name, schema_name]}
        - ck : {sqltext : "column('nullable').in_(['y', 'n'])"}
    columninfo :
      columns : [column_name, schema_name, key_name, key_type, key_value, modauthor, loadauthor, moddate, loaddate]
      constraints :
        - pk : {columns : [column_name, schema_name, key_name]}
    constraintdescript :
      columns : [constraint_type, column_name, sqltext, model_name, schema_name, modauthor, loadauthor, moddate, loaddate]
      constraints : 
        - pk : {columns : [constraint_type, column_name, sqltext, model_name, schema_name]}
